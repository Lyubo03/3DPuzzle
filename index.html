<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>3D Puzzle - Сглобяване на къща</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; font-family: Arial, sans-serif; background: #1a1a2e; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px;
            display: flex; justify-content: space-between; align-items: flex-start;
            pointer-events: none; z-index: 10;
        }
        #progress {
            background: rgba(0,0,0,0.7); color: #fff; padding: 10px 20px;
            border-radius: 8px; font-size: 18px;
        }
        #resetBtn {
            background: #e74c3c; color: #fff; border: none; padding: 10px 20px;
            border-radius: 8px; font-size: 16px; cursor: pointer; pointer-events: all;
        }
        #resetBtn:hover { background: #c0392b; }
        #winScreen {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 20;
            flex-direction: column; align-items: center; justify-content: center;
        }
        #winScreen h1 { color: #f1c40f; font-size: 48px; margin-bottom: 20px; }
        #winScreen p { color: #fff; font-size: 24px; }
        #instructions {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #aaa; padding: 10px 20px;
            border-radius: 8px; font-size: 14px; pointer-events: none;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="progress">Поставени: 0/6</div>
        <button id="resetBtn" onclick="location.reload()">Рестарт</button>
    </div>
    <div id="winScreen">
        <h1>🎉 Браво!</h1>
        <p>Къщата е сглобена!</p>
    </div>
    <div id="instructions">Ляв бутон: хвани парче &nbsp;|&nbsp; Десен бутон: въртене &nbsp;|&nbsp; Scroll: zoom</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Orbit controls (right-click to rotate)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };
        controls.target.set(0, 1.5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.minDistance = 5;
        controls.maxDistance = 25;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.update();

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.BoxGeometry(16, 0.2, 16);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.position.y = -0.1;
        ground.receiveShadow = true;
        scene.add(ground);

        // Puzzle pieces definition
        const piecesData = [
            { name: 'Под',        size: [4, 0.2, 4],    targetPos: [0, 0.1, 0],     targetRot: [0, 0, 0], color: 0x8B5E3C, scatter: [-5, 0.2, -4] },
            { name: 'Предна стена', size: [4, 2.5, 0.3], targetPos: [0, 1.35, -2],  targetRot: [0, 0, 0], color: 0xF5DEB3, scatter: [5, 1.35, -5] },
            { name: 'Задна стена',  size: [4, 2.5, 0.3], targetPos: [0, 1.35, 2],   targetRot: [0, 0, 0], color: 0xF5DEB3, scatter: [-5, 1.35, 5] },
            { name: 'Лява стена',   size: [0.3, 2.5, 4], targetPos: [-2, 1.35, 0],  targetRot: [0, 0, 0], color: 0xDEB887, scatter: [6, 1.35, 3] },
            { name: 'Покрив',       size: [4.5, 0.3, 4.5], targetPos: [0, 2.75, 0], targetRot: [0, 0, 0], color: 0xB22222, scatter: [-6, 0.2, -6] },
            { name: 'Врата',        size: [1, 1.7, 0.15], targetPos: [0, 0.95, -2.15], targetRot: [0, 0, 0], color: 0x5C3317, scatter: [4, 0.95, 6] },
        ];

        const pieces = [];
        const ghosts = [];
        let placedCount = 0;

        // Create ghosts and pieces
        piecesData.forEach((data, i) => {
            // Ghost (target outline)
            const ghostGeo = new THREE.BoxGeometry(...data.size);
            const ghostMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
            const ghost = new THREE.Mesh(ghostGeo, ghostMat);
            ghost.position.set(...data.targetPos);
            scene.add(ghost);
            ghosts.push(ghost);

            // Wireframe on ghost
            const edges = new THREE.EdgesGeometry(ghostGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true }));
            ghost.add(line);

            // Actual piece
            const pieceGeo = new THREE.BoxGeometry(...data.size);
            const pieceMat = new THREE.MeshLambertMaterial({ color: data.color });
            const piece = new THREE.Mesh(pieceGeo, pieceMat);
            piece.position.set(...data.scatter);
            piece.rotation.y = Math.random() * Math.PI * 2;
            piece.castShadow = true;
            piece.userData = { index: i, targetPos: new THREE.Vector3(...data.targetPos), placed: false, name: data.name };
            scene.add(piece);
            pieces.push(piece);
        });

        // Drag logic
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let draggedPiece = null;
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        let dragOffset = new THREE.Vector3();
        const snapThreshold = 1.2;

        function getMousePos(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        renderer.domElement.addEventListener('mousedown', (event) => {
            if (event.button !== 0) return; // Only left click

            getMousePos(event);
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(pieces);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                if (hit.userData.placed) return;

                draggedPiece = hit;
                controls.enabled = false;

                // Set drag plane at piece height
                dragPlane.set(new THREE.Vector3(0, 1, 0), -hit.position.y);
                const intersection = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, intersection);
                dragOffset.copy(hit.position).sub(intersection);

                // Highlight
                hit.material.emissive = new THREE.Color(0x333333);
            }
        });

        renderer.domElement.addEventListener('mousemove', (event) => {
            if (!draggedPiece) return;

            getMousePos(event);
            raycaster.setFromCamera(mouse, camera);

            const intersection = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, intersection);
            if (intersection) {
                draggedPiece.position.x = intersection.x + dragOffset.x;
                draggedPiece.position.z = intersection.z + dragOffset.z;
            }
        });

        renderer.domElement.addEventListener('mouseup', (event) => {
            if (!draggedPiece) return;

            const piece = draggedPiece;
            piece.material.emissive = new THREE.Color(0x000000);
            draggedPiece = null;
            controls.enabled = true;

            // Check snap
            const target = piece.userData.targetPos;
            const dist = piece.position.distanceTo(target);

            if (dist < snapThreshold) {
                // Snap!
                piece.position.copy(target);
                piece.rotation.set(0, 0, 0);
                piece.userData.placed = true;

                // Hide ghost
                ghosts[piece.userData.index].visible = false;

                placedCount++;
                document.getElementById('progress').textContent = `Поставени: ${placedCount}/6`;

                if (placedCount === 6) {
                    document.getElementById('winScreen').style.display = 'flex';
                }
            }
        });

        // Ghost pulse animation
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            // Pulse ghosts
            ghosts.forEach(ghost => {
                if (ghost.visible) {
                    ghost.material.opacity = 0.15 + Math.sin(time * 2) * 0.1;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Resize handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
